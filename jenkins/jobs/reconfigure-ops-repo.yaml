- job:
    name: reconfigure-ops-repo
    display-name: reconfigure ops repo
    concurrent: true
    parameters:
      - string:
          name: FILES_TO_COPY
          description: "Paths to copy"
          trim: true
      - string:
          name: VIDEO_INFRA_BRANCH
          default: main
          description: "Controls checkout branch for infra repos, defaults to 'main'."
          trim: true
      - string:
          name: INFRA_CONFIGURATION_REPO
          default: git@github.com:jitsi/infra-configuration.git
          description: "Repo for configuration code (ansible etc), defaults to 'git@github.com:jitsi/infra-configuration.git'."
          trim: true
      - string:
          name: INFRA_CUSTOMIZATIONS_REPO
          default: git@github.com:jitsi/infra-customizations.git
          description: "Repo with customized configurations, defaults to 'git@github.com:jitsi/infra-customizations.git'."
          trim: true
      - string:
          name: OPS_REPO_BUCKET
          default: ops-repo
          description: "Object storage bucket to rebuild. Use 'ops-repo-test' for end-to-end testing without touching production."
          trim: true
      - string:
          name: NEW_KEYID
          default: ""
          description: "Modern signing key fingerprint for dual-signing the InRelease (Debian Trixie / APT 3.0). Empty = legacy single-key signing only. See JIT-15930."
          trim: true
      - string:
          name: OPS_REPO_SECRING_CREDENTIAL_ID
          default: ops-repo-secring
          description: "Jenkins file credential for the secret keyring. Override (e.g. ops-repo-secring-test) to sign a test bucket with the combined dual-key keyring."
          trim: true
      - string:
          name: OPS_REPO_PUBRING_CREDENTIAL_ID
          default: ops-repo-pubring
          description: "Jenkins file credential for the public keyring."
          trim: true
      - string:
          name: OPS_REPO_SECRING_PASSPHRASE_CREDENTIAL_ID
          default: ops-repo-secring-passphrase
          description: "Jenkins file credential for the signing key passphrase."
          trim: true

    project-type: pipeline
    sandbox: true
    pipeline-scm:
      scm:
        - git:
            url: git@github.com:jitsi/infra-provisioning.git
            credentials-id: "video-infra"
            branches:
              - "origin/${{VIDEO_INFRA_BRANCH}}"
            browser: githubweb
            browser-url: https://github.com/jitsi/infra-provisioning
            submodule:
              recursive: true
      script-path: jenkins/groovy/reconfigure-ops-repo/Jenkinsfile
      lightweight-checkout: true
