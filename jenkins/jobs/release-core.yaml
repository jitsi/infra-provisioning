- job:
    name: release-core
    display-name: release core (shards)
    concurrent: true
    parameters:
      - string:
          name: SIGNAL_VERSION
          description: "Signal image version for shard."
          trim: true
      - string:
          name: JVB_VERSION
          description: "JVB image version for shard"
          trim: true
      - string:
          name: ENVIRONMENT
          description: "Environment to build in"
          trim: true
      - string:
          name: ORACLE_REGION
          description: "Region to build in"
          trim: true
      - string:
          name: CLOUDS
          description: "Clouds to build in, defaults to RELEASE_CLOUDS"
          trim: true
      - string:
          name: RELEASE_BRANCH
          description: "Release branch for shard"
          trim: true
      - string:
          name: VISITORS_FACTOR
          description: "Visitor factor flag"
          trim: true
      - string:
          name: SHAPE
          description: "CPU shape for signal node, can be VM.Standard.E3.Flex VM.Standard.E4.Flex or VM.Standard.A1.Flex or VM.Standard.A2.Flex"
          trim: true
      - string:
          name: JVB_SHAPE
          description: "Override CPU shape for JVB node. Disregards limits for region/AD. Can be VM.Standard.E3.Flex VM.Standard.E4.Flex or VM.Standard.A1.Flex or VM.Standard.A2.Flex"
          trim: true
      - string:
          name: INSTANCE_SHAPE_OCPUS
          description: "CPU count for signal node"
          trim: true
      - string:
          name: MEMORY_IN_GBS
          description: "Membory for signal node"
          trim: true
      - string:
          name: VIDEO_INFRA_BRANCH
          default: main
          description: "Controls checkout branch for infra repos, defaults to 'main'."
          trim: true
      - string:
          name: CLOUD_PROVIDER
          default: oracle
          description: "Cloud to build JVBs in, defaults to 'oracle'."
          trim: true
      - string:
          name: CORE_CLOUD_PROVIDER
          default: oracle
          description: "Cloud to build signal node in, defaults to 'oracle'."
          trim: true
      - bool:
          name: FORCE_BUILD_JVB_IMAGE
          default: false
          description: "Force JVB image to build"
      - bool:
          name: FORCE_BUILD_SIGNAL_IMAGE
          default: false
          description: "Force Signal image to build"
      # ---- govern8 governance (standard) ----
      - string:
          name: RP_TICKET
          default: ""
          description: "RP ticket (format: RP-1234) for govern8 change tracking. Auto-extracted from govern8 if left empty."
          trim: true
      - string:
          name: JIRA_TICKET
          default: ""
          description: "Optional JIRA ticket associated with this change, for govern8 tracking."
          trim: true
      - bool:
          name: GOVERNANCE_ENABLED
          default: true
          description: "Enable govern8 governance hooks (pre/post release & deploy gates)."
      - bool:
          name: GOVERNANCE_STAGING
          default: false
          description: "Target the govern8 STAGING endpoint instead of production."
      - bool:
          name: FAST_TRACK
          default: false
          description: "Fast-track the change — skip manual verification/approval gates."
      - bool:
          name: GOVERN8_VERBOSE
          default: false
          description: "Mirror govern8 hook output (payloads, responses, gate results, shell traces) to the console. When off it goes only to the archived govern8.log artifact; warnings always show."
      # ---- govern8 governance (advanced, optional) ----
      - bool:
          name: GOVERNANCE_ALLOW_OVERRIDE
          default: true
          description: "Allow a human to override a govern8 DENY via an input prompt instead of failing the build."
      - bool:
          name: GOVERN8_SKIP_GATES
          default: false
          description: "Send govern8 notifications but do not poll/block on the gate result."
      - string:
          name: GOVERN8_GATE_TIMEOUT
          default: "60"
          description: "Seconds a gate may stay PENDING before offering an interactive 'skip' prompt (0 disables the prompt)."
          trim: true
      - string:
          name: INFRA_CONFIGURATION_REPO
          default: git@github.com:jitsi/infra-configuration.git
          description: "Repo for configuration code (ansible etc), defaults to 'git@github.com:jitsi/infra-configuration.git'."
          trim: true
      - string:
          name: INFRA_CUSTOMIZATIONS_REPO
          default: git@github.com:jitsi/infra-customizations.git
          description: "Repo with customized configurations, defaults to 'git@github.com:jitsi/infra-customizations.git'."
          trim: true
 
    project-type: pipeline
    sandbox: true
    pipeline-scm:
      scm:
        - git:
            url: git@github.com:jitsi/infra-provisioning.git
            credentials-id: "video-infra"
            branches:
              - "origin/${{VIDEO_INFRA_BRANCH}}"
            browser: githubweb
            browser-url: https://github.com/jitsi/infra-provisioning
            submodule:
              recursive: true
      script-path: jenkins/groovy/release-core/Jenkinsfile
      lightweight-checkout: true
