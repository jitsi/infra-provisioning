- job:
    name: release-jigasi
    display-name: release jigasi
    concurrent: true
    parameters:
      - string:
          name: JIGASI_VERSION
          description: "Controls the version of jigasi to build."
          trim: true
      - string:
          name: VIDEO_INFRA_BRANCH
          default: main
          description: "Controls checkout branch for infra repos, defaults to 'main'."
          trim: true
      - string:
          name: ENVIRONMENT
          default: lonely
          description: "Environment to build in, defaults to 'lonely'."
          trim: true
      - string:
          name: CLOUD_PROVIDER
          default: oracle
          description: "Cloud Provider, defaults to 'oracle'"
          trim: true
      - string:
          name: RELEASE_BRANCH
          description: "Name of an existing infra branch to use when creating the release, otherwise tags HEAD with jibri-release-$BUILD_ID"
          trim: true
      - string:
          name: CLOUDS
          description: "Clouds to build in, defaults to RELEASE_CLOUDS for environment."
          trim: true
      - string:
          name: JIGASI_TRANSCRIBER_FLAG
          description: "Controls whether to deploy a transcriber or traditional jigasi, set to 'true' for transcriber"
          trim: true
      - bool:
          name: FORCE_BUILD_IMAGE
          default: false
          description: "Flag to control whether to force image builds if a matching image exists"
      - string:
          name: SHAPE
          description: "VM Instance shape for jigasi"
          trim: true
      - string:
          name: INFRA_CONFIGURATION_REPO
          default: git@github.com:jitsi/infra-configuration.git
          description: "Repo for configuration code (ansible etc), defaults to 'git@github.com:jitsi/infra-configuration.git'."
          trim: true
      - string:
          name: INFRA_CUSTOMIZATIONS_REPO
          default: git@github.com:jitsi/infra-customizations.git
          description: "Repo with customized configurations, defaults to 'git@github.com:jitsi/infra-customizations.git'."
          trim: true
      # ---- govern8 governance (standard) ----
      - string:
          name: RP_TICKET
          default: ""
          description: "RP ticket (format: RP-1234) for govern8 change tracking. Auto-extracted from govern8 if left empty."
          trim: true
      - string:
          name: JIRA_TICKET
          default: ""
          description: "Optional JIRA ticket associated with this change, for govern8 tracking."
          trim: true
      - bool:
          name: GOVERNANCE_ENABLED
          default: true
          description: "Enable govern8 governance hooks (pre/post release & deploy gates)."
      - bool:
          name: GOVERNANCE_STAGING
          default: false
          description: "Target the govern8 STAGING endpoint instead of production."
      - bool:
          name: FAST_TRACK
          default: false
          description: "Fast-track the change — skip manual verification/approval gates."
      - bool:
          name: GOVERN8_VERBOSE
          default: false
          description: "Mirror govern8 hook output (payloads, responses, gate results, shell traces) to the console. When off it goes only to the archived govern8.log artifact; warnings always show."
      # ---- govern8 governance (advanced, optional) ----
      - bool:
          name: GOVERNANCE_ALLOW_OVERRIDE
          default: true
          description: "Allow a human to override a govern8 DENY via an input prompt instead of failing the build."
      - bool:
          name: GOVERN8_SKIP_GATES
          default: false
          description: "Send govern8 notifications but do not poll/block on the gate result."
      - string:
          name: GOVERN8_GATE_TIMEOUT
          default: "60"
          description: "Seconds a gate may stay PENDING before offering an interactive 'skip' prompt (0 disables the prompt)."
          trim: true

    project-type: pipeline
    sandbox: true
    pipeline-scm:
      scm:
        - git:
            url: git@github.com:jitsi/infra-provisioning.git
            credentials-id: "video-infra"
            branches:
              - "origin/${{VIDEO_INFRA_BRANCH}}"
            browser: githubweb
            browser-url: https://github.com/jitsi/infra-provisioning
            submodule:
              recursive: true
      script-path: jenkins/groovy/release-jigasi/Jenkinsfile
      lightweight-checkout: true
